services:
  # --- Databases ---
  postgres-db:
    image: postgres:15-alpine
    container_name: go-amrit-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Kunj#477}
      POSTGRES_DB: medusa_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis-cache:
    image: redis:7-alpine
    container_name: go-amrit-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- Medusa Backend ---
  medusa-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: go-amrit-backend
    restart: always
    ports:
      - "9000:9000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-Kunj#477}@postgres-db:5432/medusa_db
      - REDIS_URL=redis://redis-cache:6379
    volumes:
      - ./backend/uploads:/app/public/uploads
    depends_on:
      - postgres-db
      - redis-cache

  # --- Next.js Frontend ---
  next-storefront:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: go-amrit-storefront
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://api.goamrit.com
      - NEXT_PUBLIC_RAZORPAY_KEY=${NEXT_PUBLIC_RAZORPAY_KEY}
      - MEDUSA_INTERNAL_BACKEND_URL=http://medusa-backend:9000
    depends_on:
      - medusa-backend

  # --- Nginx Proxy & SSL ---
  nginx-proxy:
    image: nginx:latest
    container_name: go-amrit-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - next-storefront
      - medusa-backend

volumes:
  postgres_data:
  redis_data:

