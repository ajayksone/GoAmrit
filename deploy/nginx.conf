# --- Storefront (Next.js on port 3000) ---
server {
    listen 80;
    server_name goamrit.com www.goamrit.com;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name goamrit.com www.goamrit.com;

    # SSL Certificates (will be updated/generated by Certbot)
    ssl_certificate /etc/letsencrypt/live/goamrit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goamrit.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";

    location / {
        proxy_pass http://localhost:3000; # Next.js storefront port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Backend API (Medusa on port 9000) ---
