# --- GoAmrit Storefront ---
server {
    listen 80;
    server_name goamrit.com www.goamrit.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 50M;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name goamrit.com www.goamrit.com;

    ssl_certificate /etc/letsencrypt/live/goamrit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goamrit.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://next-storefront:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# --- Medusa Backend API ---
server {
    listen 80;
    server_name api.goamrit.com;

    client_max_body_size 50M;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.goamrit.com;

    ssl_certificate /etc/letsencrypt/live/api.goamrit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.goamrit.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://medusa-backend:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
